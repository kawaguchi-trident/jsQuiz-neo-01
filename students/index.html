<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>JavaScriptクイズ①</title>
</head>

<body>
  <p id="trident" class="school">トライデントコンピュータ専門学校</p>
  <ul>
    <li class="red">赤</li>
    <li class="blue">青</li>
    <li class="orange">オレンジ</li>
  </ul>

  <style>
    #trident {
      font-weight: bold;
      font-size: 1.5em;
    }

    .colorRed {
      color: red;
    }

    .colorBlue {
      color: blue;
    }

    .colorOrange {
      color: orange;
    }
  </style>
  <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
    crossorigin="anonymous">
    </script>
  <script>

    const name = document.querySelector(".school");
    const list = document.querySelectorAll("li");

    for (let i = 0; i < list.length; i++) {
      list[i].addEventListener("click", function () {

        name.classList.remove("colorRed", "colorBlue", "colorOrange");

        if (i === 0) {
          name.classList.add("colorRed");
        } else if (i === 1) {
          name.classList.add("colorBlue");
        } else if (i === 2) {
          name.classList.add("colorOrange");
        }

      });
    }
  </script>
</body>

</html>
