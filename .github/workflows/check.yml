name: Check Quiz 01

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js を準備
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存をインストール
        run: npm ci

      - name: 出席番号を検出
        id: detect
        run: |
          STUDENT_ID=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^students/[0-9][0-9]/index\.html$' | head -n 1 | cut -d '/' -f 2)
          echo "student_id=$STUDENT_ID" >> $GITHUB_OUTPUT

      - name: 出席番号を表示
        run: echo "student_id=${{ steps.detect.outputs.student_id }}"

      - name: 自動判定を実行
        id: check
        run: |
          node .github/scripts/check.js ${{ steps.detect.outputs.student_id }} > result.txt 2>&1
        continue-on-error: true

      - name: 試行回数を取得
        id: count
        run: |
          COUNT=$(git rev-list --count origin/${{ github.base_ref }}..HEAD)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: 判定結果をPRにコメント
        uses: actions/github-script@v7
        env:
          STUDENT_ID: ${{ steps.detect.outputs.student_id }}
          CHECK_RESULT: ${{ steps.check.outcome }}
          ATTEMPT_COUNT: ${{ steps.count.outputs.count }}
        with:
          const fs = require('fs');

          const studentId = process.env.STUDENT_ID;
          const result = process.env.CHECK_RESULT;
          const attempt = Number(process.env.ATTEMPT_COUNT || '1');

          let jqueryAnswer = '';
          let vanillaAnswer = '';

          try {
            jqueryAnswer = fs.readFileSync('.github/answers/01-jquery.js', 'utf8').trim();
          } catch (error) {
            jqueryAnswer = 'jQuery版の模範回答を読み込めませんでした。';
          }

          try {
            vanillaAnswer = fs.readFileSync('.github/answers/01-vanilla.js', 'utf8').trim();
          } catch (error) {
            vanillaAnswer = 'Vanilla JS版の模範回答を読み込めませんでした。';
          }

          let detail = '';

          try {
            detail = fs.readFileSync('result.txt', 'utf8').trim();
          } catch (error) {
            detail = '判定ログを取得できませんでした。';
          }

          if (!detail) {
            detail = 'エラー内容を取得できませんでした。';
          }

          const lines = detail
            .split('\n')
            .map((line) => line.trim())
            .filter((line) => line !== '');

          const lastLine = lines.length > 0 ? lines[lines.length - 1] : detail;

          let hint = '';

          if (attempt === 1) {
            hint = 'クリックした色に応じて、#trident のクラスを正しく切り替えてください。';
          } else if (attempt === 2) {
            if (lastLine.includes('colorRed')) {
              hint = '赤をクリックしたときに colorRed を付ける処理を確認してください。';
            } else if (lastLine.includes('colorBlue')) {
              hint = '青をクリックしたときに colorBlue を付ける処理を確認してください。';
            } else if (lastLine.includes('colorOrange')) {
              hint = 'オレンジをクリックしたときに colorOrange を付ける処理を確認してください。';
            } else if (lastLine.includes('以外の色クラスが残っています')) {
              hint = '前の色クラスが残らないように removeClass などで切り替えてください。';
            } else if (lastLine.includes('要素が見つかりません')) {
              hint = 'HTMLの構造を変更していないか確認してください。';
            } else {
              hint = 'クリックした色に応じて、#trident のクラスを正しく切り替えてください。';
            }
          } else {
            hint = `### 模範回答（jQuery）

            \`\`\`js
            ${jqueryAnswer}
            \`\`\`

            ### 模範回答（Vanilla JS）

            \`\`\`js
            ${vanillaAnswer}
            \`\`\``;
          }

          let body = '';

          if (!studentId) {
            body = '## 自動判定結果\n'
              + '- 提出ファイルを確認できませんでした。';
          } else if (result === 'success') {
            body = '## 自動判定結果\n'
              + '- 出席番号: ' + studentId + '\n'
              + '- 判定: 合格\n'
              + '- 動作確認を通過しました。';
          } else if (attempt >= 3) {
            body = '## 自動判定結果\n'
              + '- 出席番号: ' + studentId + '\n'
              + '- 判定: 不合格\n'
              + '- 試行回数: ' + attempt + '回目\n'
              + '- 詳細: ' + lastLine + '\n\n'
              + hint;
          } else {
            body = '## 自動判定結果\n'
              + '- 出席番号: ' + studentId + '\n'
              + '- 判定: 不合格\n'
              + '- 試行回数: ' + attempt + '回目\n'
              + '- 詳細: ' + lastLine + '\n'
              + '- ヒント: ' + hint;
          }

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: body
          });

      - name: 不合格なら workflow を失敗にする
        if: steps.check.outcome == 'failure'
        run: exit 1