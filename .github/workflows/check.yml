name: Check Quiz 01

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js を準備
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存をインストール
        run: npm ci

      - name: 出席番号を検出
        id: detect
        run: |
          STUDENT_ID=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^students/[0-9][0-9]/index\.html$' | head -n 1 | cut -d '/' -f 2)
          echo "student_id=$STUDENT_ID" >> $GITHUB_OUTPUT

      - name: 出席番号を表示
        run: echo "student_id=${{ steps.detect.outputs.student_id }}"

      - name: 自動判定を実行
        id: check
        run: |
          npm run check -- ${{ steps.detect.outputs.student_id }} > result.txt 2>&1
        continue-on-error: true

      - name: 判定結果をPRにコメント
        uses: actions/github-script@v7
        env:
          STUDENT_ID: ${{ steps.detect.outputs.student_id }}
          CHECK_RESULT: ${{ steps.check.outcome }}
        with:
          script: |
            const fs = require('fs');

            const studentId = process.env.STUDENT_ID;
            const result = process.env.CHECK_RESULT;

            let detail = '';

            try {
              detail = fs.readFileSync('result.txt', 'utf8').trim();
            } catch (error) {
              detail = '判定ログを取得できませんでした。';
            }

            let body = '';

            if (!studentId) {
              body = '## 自動判定結果\n提出ファイルを確認できませんでした。';
            } else if (result === 'success') {
              body = '## 自動判定結果\n'
                + '- 出席番号: ' + studentId + '\n'
                + '- 判定: 合格\n'
                + '- 動作確認を通過しました。';
            } else {
              body = '## 自動判定結果\n'
                + '- 出席番号: ' + studentId + '\n'
                + '- 判定: 不合格\n'
                + '- 詳細: ' + detail + '\n'
                + '- ヒント: クリックした色に応じて、#trident のクラスを正しく切り替えてください。';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: 不合格なら workflow を失敗にする
        if: steps.check.outcome == 'failure'
        run: exit 1