name: Check Quiz

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js を準備
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存をインストール
        run: npm ci

      - name: 自動判定を実行
        run: node .github/scripts/check.js