name: Check Quiz 01

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js を準備
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存をインストール
        run: npm ci

      - name: 出席番号を検出
        id: detect
        run: |
          STUDENT_ID=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^students/[0-9][0-9]/index\.html$' | head -n 1 | cut -d '/' -f 2)
          echo "student_id=$STUDENT_ID" >> $GITHUB_OUTPUT

      - name: 出席番号を表示
        run: echo "student_id=${{ steps.detect.outputs.student_id }}"

      - name: 自動判定を実行
        id: check
        run: |
          node scripts/check.js ${{ steps.detect.outputs.student_id }} > result.txt 2>&1
        continue-on-error: true

            - name: 判定結果をPRにコメント
        uses: actions/github-script@v7
        env:
          STUDENT_ID: ${{ steps.detect.outputs.student_id }}
          CHECK_RESULT: ${{ steps.check.outcome }}
        with:
          script: |
            const fs = require('fs');

            const studentId = process.env.STUDENT_ID;
            const result = process.env.CHECK_RESULT;

            let detail = '';

            try {
              detail = fs.readFileSync('result.txt', 'utf8').trim();
            } catch (error) {
              detail = '判定ログを取得できませんでした。';
            }

            if (!detail) {
              detail = 'エラー内容を取得できませんでした。';
            }

            const lines = detail
              .split('\n')
              .map((line) => line.trim())
              .filter((line) => line !== '');

            const lastLine = lines.length > 0 ? lines[lines.length - 1] : detail;

            let hint = 'クリックした色に応じて、#trident のクラスを正しく切り替えてください。';

            if (lastLine.includes('colorRed')) {
              hint = '赤をクリックしたときに colorRed を付ける処理を確認してください。';
            } else if (lastLine.includes('colorBlue')) {
              hint = '青をクリックしたときに colorBlue を付ける処理を確認してください。';
            } else if (lastLine.includes('colorOrange')) {
              hint = 'オレンジをクリックしたときに colorOrange を付ける処理を確認してください。';
            } else if (lastLine.includes('以外の色クラスが残っています')) {
              hint = '前の色クラスが残らないように removeClass などで切り替えてください。';
            } else if (lastLine.includes('要素が見つかりません')) {
              hint = 'HTMLの構造を変更していないか確認してください。';
            }

            let body = '';

            if (!studentId) {
              body = '## 自動判定結果\n'
                + '- 提出ファイルを確認できませんでした。';
            } else if (result === 'success') {
              body = '## 自動判定結果\n'
                + '- 出席番号: ' + studentId + '\n'
                + '- 判定: 合格\n'
                + '- 動作確認を通過しました。';
            } else {
              body = '## 自動判定結果\n'
                + '- 出席番号: ' + studentId + '\n'
                + '- 判定: 不合格\n'
                + '- 詳細: ' + lastLine + '\n'
                + '- ヒント: ' + hint;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: 不合格なら workflow を失敗にする
        if: steps.check.outcome == 'failure'
        run: exit 1